name: Build for Termux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore 3dEngine.sln

      - name: Build solution
        run: dotnet build 3dEngine.sln -c Release

      - name: Publish for Termux (linux-arm64)
        run: |
          dotnet publish SampleGame/SampleGame.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:EnableCompressionInSingleFile=false \
            -o ./publish/termux

      - name: Copy launch scripts and asset
        run: |
          cp termux-setup.sh ./publish/termux/
          cp termux-run.sh ./publish/termux/
          cp SampleGame/monkey.obj ./publish/termux/
          chmod +x ./publish/termux/termux-setup.sh
          chmod +x ./publish/termux/termux-run.sh

      - name: Create release archive
        run: |
          cd ./publish/termux
          zip -r ../../Neo3dEngine-termux-release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-build
          path: Neo3dEngine-termux-release.zip

      - name: Create or update latest release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: termux-latest
          name: Neo3dEngine Termux Latest
          body: |
            Automated linux-arm64 build for Termux.
            Download `Neo3dEngine-termux-release.zip`, extract and run `./termux-setup.sh` on your Android device.
          files: Neo3dEngine-termux-release.zip
          fail_on_unmatched_paths: false
