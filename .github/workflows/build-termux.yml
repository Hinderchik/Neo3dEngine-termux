name: Build for Termux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install .NET workloads
        run: |
          dotnet workload install android
          dotnet workload install wasm-tools-net8

      - name: Restore dependencies
        run: dotnet restore 3dEngine.sln

      - name: Build solution
        run: dotnet build 3dEngine.sln -c Release

      - name: Publish for Termux (linux-arm64)
        run: |
          dotnet publish SampleGame/SampleGame.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:EnableCompressionInSingleFile=false \
            -o ./publish/termux

      - name: Copy launch scripts and asset
        run: |
          cp termux-setup.sh ./publish/termux/
          cp termux-run.sh ./publish/termux/
          cp SampleGame/monkey.obj ./publish/termux/
          chmod +x ./publish/termux/termux-setup.sh
          chmod +x ./publish/termux/termux-run.sh

      - name: Create release archive
        run: |
          cd ./publish/termux
          zip -r ../../Neo3dEngine-termux-release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-build
          path: Neo3dEngine-termux-release.zip

      - name: Build Android APK
        run: |
          dotnet publish Neo3dEngine.Android/Neo3dEngine.Android.csproj \
            -c Release \
            -f net8.0-android \
            -p:AndroidPackageFormat=apk \
            -o ./publish/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: publish/android/*.apk

      - name: Create or update latest release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: termux-latest
          name: Neo3dEngine Termux Latest
          body: |
            Automated linux-arm64 and Android APK build.
            Download `Neo3dEngine-termux-release.zip` for Termux or `*.apk` for Android.
          files: |
            Neo3dEngine-termux-release.zip
            publish/android/*.apk
